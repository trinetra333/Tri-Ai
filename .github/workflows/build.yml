name: Build Tri Ai (Android / Web / iOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tri-ai-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Rename APK for release
        if: github.event_name != 'pull_request'
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/tri-ai.apk

      - name: Publish / update "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tri Ai (latest build)
          body: Automatically built from the latest push to main. Always contains the newest APK.
          prerelease: true
          make_latest: true
          files: build/app/outputs/flutter-apk/tri-ai.apk

  build-web:
    runs-on: ubuntu-latest
    needs: build-android
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # Web build doesn't compile the native Android/iOS plugin code,
        # so the stable-diffusion.cpp submodule isn't needed here.

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release web bundle
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tri-ai-web-build
          path: build/web

      - name: Zip web build for release
        if: github.event_name != 'pull_request'
        run: cd build/web && zip -r ../../tri-ai-web.zip . && cd ../..

      - name: Publish / update "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tri Ai (latest build)
          body: Automatically built from the latest push to main. Always contains the newest builds.
          prerelease: true
          make_latest: true
          files: tri-ai-web.zip

  build-ios:
    runs-on: macos-latest
    needs: build-android
    permissions:
      contents: write
    # Unsigned compile-check build: verifies the app and native iOS plugin
    # code compile cleanly. Produces an unsigned .app, not an installable
    # .ipa — that requires an Apple Developer account and signing secrets.
    continue-on-error: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"

      - name: Upload unsigned .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: tri-ai-ios-unsigned
          path: build/ios/iphoneos/Runner.app

      - name: Zip unsigned .app for release
        if: github.event_name != 'pull_request'
        run: cd build/ios/iphoneos && zip -r ../../../tri-ai-ios-unsigned.zip Runner.app && cd ../../..

      - name: Publish / update "latest" release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Tri Ai (latest build)
          body: Automatically built from the latest push to main. Always contains the newest builds.
          prerelease: true
          make_latest: true
          files: tri-ai-ios-unsigned.zip
