name: tri_ai
description: Tri Ai — Premium Local/Cloud LLM Assistant
publish_to: "none"
version: 1.0.3+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Persistent Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Local AI Inference (Android)
  llama_flutter_android: ^0.2.0
  sd_flutter_android:
    path: local_plugins/sd_flutter_android

  # FFI for native library interop
  ffi: ^2.1.2

  # Networking
  dio: ^5.7.0
  http: ^1.2.0

  # Firebase (Push Updates)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0

  # File System & Permissions
  path_provider: ^2.1.0
  permission_handler: ^11.3.0

  # Image Support
  image_picker: ^1.1.0
  share_plus: ^10.0.0

  # UI
  google_fonts: ^6.2.0
  flutter_markdown: ^0.7.4

  # Utils
  uuid: ^4.5.0
  intl: ^0.19.0

  # Background / Boot Persistence
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.0.0
  file_picker: ^11.0.2
  flutter_inappwebview: ^6.1.5
  image: ^4.8.0
  flutter_litert_lm:
    path: local_plugins/flutter_litert_lm
  gal: ^2.3.2
  syncfusion_flutter_pdf: ^33.2.6
  speech_to_text: ^7.0.0
  firebase_crashlytics: ^4.3.10
  package_info_plus: ^9.0.1
  device_info_plus: 12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  llama_flutter_android:
    path: local_plugins/llama_flutter_android

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/webgpu_engine.html
    - assets/icons/
